version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal
      POSTGRES_DB: signal_hunter
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./storage/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal -d signal_hunter"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat /dev/null > /dev/tcp/localhost/6333' && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  embedder:
    build: .
    ports:
      - "6335:6335"
    volumes:
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6335/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  embedder-vectorizer:
    build: .
    ports:
      - "6336:6336"
    volumes:
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    command: ["uvicorn", "embedder_service:app", "--host", "0.0.0.0", "--port", "6336"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6336/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  web-report:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      # Override localhost URLs from .env to use Docker service names
      - DATABASE_URL=postgresql://signal:signal@postgres:5432/signal_hunter
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDER_URL=http://embedder:6335
      # Translator runs on the Devstral GPU server (MADLAD-400-3B on 64 EPYC cores)
      - TRANSLATOR_URL=http://10.10.10.4:6340
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  translate-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signal-hunter-translate-worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://signal:signal@postgres:5432/signal_hunter
      - TRANSLATOR_URL=http://10.10.10.4:6340
      - TARGET_LANG=ru
      - BATCH_SIZE=32
      - POLL_INTERVAL=30
    command: ["python", "-m", "core.translate_worker"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  qdrantdata:
  hf_cache:
